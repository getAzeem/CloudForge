---
# update the apt cache so that package installations have the latest data
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

# install packages required by Kubernetes and helpers used by other tasks
- name: Install required packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: yes

# turn off swap immediately; Kubernetes requires swap to be disabled
- name: Disable swap immediately
  ansible.builtin.command:
    cmd: swapoff -a
  when: ansible_swaptotal_mb > 0

# make sure swap entries in /etc/fstab are commented out so they don't return on reboot
- name: Remove swap entries from /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '(^.*[ \t]swap[ \t].*$)'
    replace: '# \1'
    backup: yes

# ensure the kernel modules overlay and br_netfilter are loaded at boot
- name: Ensure k8s modules will be loaded on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    owner: root
    group: root
    mode: '0644'

- name: Load kernel modules immediately
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

# configure required sysctl parameters for Kubernetes networking
- name: Write sysctl configuration for Kubernetes networking
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
    owner: root
    group: root
    mode: '0644'

- name: Apply sysctl settings
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: false
