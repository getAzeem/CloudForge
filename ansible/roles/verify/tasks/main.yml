---

# Ensure .kube directory exists first
- name: Ensure .kube directory exists
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'


# Fetch kubeconfig from master node
- name: Copy kubeconfig from master
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: /tmp/admin.conf
    flat: yes
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true


# Install kubeconfig on kubectl server
- name: Copy kubeconfig to kubectl server
  ansible.builtin.copy:
    src: /tmp/admin.conf
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: '0644'


# Set KUBECONFIG environment globally
- name: Export KUBECONFIG permanently
  ansible.builtin.lineinfile:
    path: /home/ubuntu/.bashrc
    line: 'export KUBECONFIG=/home/ubuntu/.kube/config'
    create: yes


# Verify cluster nodes
- name: Verify cluster nodes are present
  ansible.builtin.command:
    cmd: kubectl get nodes
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: nodes_output
  changed_when: false


# Print nodes
- name: Print nodes
  ansible.builtin.debug:
    var: nodes_output.stdout