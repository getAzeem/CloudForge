---
# deploy the NGINX ingress controller using the official manifest
# applying the manifest is idempotent so it is safe to run every time
- name: Install NGINX Ingress Controller
  ansible.builtin.command:
    cmd: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.3.0/deploy/static/provider/cloud/deploy.yaml
  changed_when: true
