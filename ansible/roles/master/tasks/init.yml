---
# initialize the control plane if it has not already been done
- name: Check for existing kube admin.conf
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadmin_conf

- name: Run kubeadm init to bootstrap the control plane
  ansible.builtin.command: >
    kubeadm init --pod-network-cidr={{ kube_pod_network_cidr }}
  register: kubeadm_init
  when: not kubeadmin_conf.stat.exists
  args:
    creates: /etc/kubernetes/admin.conf

- name: Ensure .kube directory for ubuntu user
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'
  when: not kubeadmin_conf.stat.exists

- name: Copy admin.conf to ubuntu user's kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: '0644'
  when: not kubeadmin_conf.stat.exists

- name: Generate worker join command
  ansible.builtin.command:
    cmd: kubeadm token create --print-join-command
  register: join_command
  when: not kubeadmin_conf.stat.exists

# make the join command available as a host fact for other roles
- name: Set join_command fact
  ansible.builtin.set_fact:
    join_command: "{{ join_command.stdout }}"
  when: join_command is defined
